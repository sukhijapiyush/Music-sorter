<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Editor</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .card {
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border: none;
            padding: 20px;
        }
        .carousel-control-prev-icon,
        .carousel-control-next-icon {
            background-color: #000;
        }
        .btn-skip {
            background-color: #6c757d;
            color: #fff;
        }
        .card-body {
            padding: 20px;
        }
        .btn-container {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgb(0,0,0);
            background-color: rgba(0,0,0,0.4);
        }
        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">CSV Editor</h1>
        <div id="carouselExampleControls" class="carousel slide" data-ride="carousel" data-interval="false">
            <div class="carousel-inner">
                {% for row in rows %}
                <div class="carousel-item {% if loop.first %}active{% endif %}">
                    <div class="d-flex justify-content-center">
                        <div class="card" style="width: 24rem;">
                            <div class="card-body">
                                {% for key, value in row.items() %}
                                <p class="card-text"><strong>{{ key }}:</strong> {{ value }}</p>
                                {% endfor %}
                                <div class="btn-container">
                                    <button class="btn btn-primary" onclick="openEditModal({{ loop.index0 }})">Edit</button>
                                    <a class="btn btn-skip" href="#carouselExampleControls" role="button" data-slide="next">Skip</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
            <a class="carousel-control-prev" href="#carouselExampleControls" role="button" data-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="sr-only">Previous</span>
            </a>
            <a class="carousel-control-next" href="#carouselExampleControls" role="button" data-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="sr-only">Next</span>
            </a>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeEditModal()">&times;</span>
            <form id="editForm">
                <!-- Form fields will be populated by JavaScript -->
            </form>
            <button class="btn btn-primary" onclick="saveEdit()">Save</button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        function openEditModal(rowId) {
            const rows = {{ rows|tojson }};
            const row = rows[rowId];
            const form = document.getElementById('editForm');
            form.innerHTML = '';
            for (const key in row) {
                const div = document.createElement('div');
                div.className = 'form-group';
                div.innerHTML = `<label for="${key}">${key}</label><input type="text" class="form-control" id="${key}" name="${key}" value="${row[key]}">`;
                form.appendChild(div);
            }
            form.dataset.rowId = rowId;
            document.getElementById('editModal').style.display = 'block';
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        function saveEdit() {
            const form = document.getElementById('editForm');
            const rowId = form.dataset.rowId;
            const formData = new FormData(form);
            fetch(`/edit/${rowId}`, {
                method: 'POST',
                body: new URLSearchParams(formData)
            }).then(response => response.json()).then(data => {
                if (data.success) {
                    closeEditModal();
                    $('#carouselExampleControls').carousel('next');
                }
            });
        }
    </script>
</body>
</html>
